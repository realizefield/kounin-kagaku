<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC04 食品の成分 ① drill</title>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #ea580c;
    --primary-light: #fed7aa;
    --primary-dark: #c2410c;
    --bg: #fff7ed;
    --card: #ffffff;
    --text: #1c1917;
    --text-sub: #78716c;
    --border: #e7e5e4;
    --correct: #16a34a;
    --wrong: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'BIZ UDPGothic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--primary);
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .back { color: white; text-decoration: none; font-size: 20px; }
  header h1 { font-size: 17px; font-weight: 700; line-height: 1.3; }
  header .badge { margin-left: auto; background: rgba(255,255,255,0.25); border-radius: 20px; padding: 3px 10px; font-size: 12px; }

  .container { max-width: 680px; margin: 0 auto; padding: 20px 16px 40px; }

  .progress-bar {
    background: var(--primary-light);
    border-radius: 20px;
    height: 8px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    background: var(--primary);
    height: 100%;
    border-radius: 20px;
    transition: width 0.4s;
  }
  .progress-text { font-size: 12px; color: var(--text-sub); margin-bottom: 8px; }

  .q-card {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    border: 2px solid var(--border);
    margin-bottom: 12px;
  }
  .q-num {
    font-size: 12px;
    color: var(--primary);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .q-text {
    font-size: 15px;
    line-height: 1.8;
    margin-bottom: 14px;
  }
  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice-btn {
    background: white;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    text-align: left;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    line-height: 1.5;
    transition: border-color 0.15s, background 0.15s;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--primary); background: var(--bg); }
  .choice-btn.correct { border-color: var(--correct); background: #f0fdf4; color: var(--correct); font-weight: 700; }
  .choice-btn.wrong { border-color: var(--wrong); background: #fef2f2; color: var(--wrong); }

  .feedback {
    display: none;
    margin-top: 10px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.8;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
  .feedback.ng { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

  /* 語群タップ用スタイル追加 */
  .kw-drill {
    display: inline-block;
    background: #fff7ed;
    border: 2px solid var(--primary);
    border-radius: 6px;
    padding: 1px 8px;
    color: var(--primary-dark);
    font-weight: 700;
    font-size: 14px;
  }
  .word-btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .word-challenge-btn {
    background: var(--primary); color: white; border: none;
    border-radius: 8px; padding: 10px 20px; font-size: 14px;
    font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .word-judge-btn {
    background: #059669; color: white; border: none;
    border-radius: 8px; padding: 10px 20px; font-size: 14px;
    font-weight: 700; cursor: pointer; font-family: inherit; display: none;
  }
  .word-ans-btn {
    background: white; color: var(--primary); border: 2px solid var(--primary);
    border-radius: 8px; padding: 10px 20px; font-size: 14px;
    font-weight: 700; cursor: pointer; font-family: inherit; display: none;
  }

  /* スコア */
  .score-card {
    background: var(--card);
    border-radius: 14px;
    padding: 28px 20px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    display: none;
  }
  .score-card.show { display: block; }
  .score-big { font-size: 56px; font-weight: 700; color: var(--primary); }
  .score-label { font-size: 14px; color: var(--text-sub); margin-bottom: 16px; }
  .score-msg { font-size: 16px; font-weight: 700; margin-bottom: 24px; }

  .nav-btn {
    display: block;
    width: 100%;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    text-align: center;
    text-decoration: none;
    margin-top: 12px;
  }
  .nav-btn-outline {
    display: block;
    width: 100%;
    background: white;
    color: var(--primary);
    border: 2px solid var(--primary);
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    text-align: center;
    text-decoration: none;
    margin-top: 10px;
  }

  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    pointer-events: none;
    animation: fall 2.5s ease-out forwards;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<header>
  <a href="SC04_intro.html" class="back">←</a>
  <h1>SC04 食品の成分と性質<br>① 栄養素と炭水化物</h1>
  <span class="badge">drill</span>
</header>

<div class="container">
  <div class="progress-text" id="prog-text">問題 1 / 8</div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:12.5%"></div></div>

  <div id="quiz-area"></div>
  <div class="score-card" id="score-card">
    <div class="score-big" id="sc-score"></div>
    <div class="score-label" id="sc-label"></div>
    <div class="score-msg" id="sc-msg"></div>
    <a href="SC04_check.html" class="nav-btn">まとめチェックに進む →</a>
    <button class="nav-btn-outline" onclick="restart()">もう一度チャレンジ</button>
    <a href="SC04_intro.html" class="nav-btn-outline">解説を見直す</a>
  </div>
</div>

<script>
// ======= 問題データ =======
var questions = [
  // Q1: 四択
  {
    type: 'mc',
    num: 1,
    text: '三大栄養素として正しいものはどれか。',
    choices: [
      '炭水化物・タンパク質・無機質',
      '油脂・タンパク質・ビタミン',
      '油脂・無機質・ビタミン',
      '炭水化物・油脂・タンパク質'
    ],
    correct: 3,
    explanation: '三大栄養素は「炭水化物・油脂（脂質）・タンパク質」。無機質・ビタミンは三大には含まれず、これらを加えて五大栄養素になります。'
  },
  // Q2: 四択
  {
    type: 'mc',
    num: 2,
    text: 'デンプンを単糖類・二糖類・多糖類のいずれかに分類すると？',
    choices: [
      '単糖類',
      '二糖類',
      '多糖類',
      'どれでもない'
    ],
    correct: 2,
    explanation: 'デンプンはグルコース（単糖）が多数結合した多糖類です。グルコースは単糖類、マルトース・スクロースは二糖類。'
  },
  // Q3: 四択
  {
    type: 'mc',
    num: 3,
    text: 'デンプンにヨウ素液を加えると何色になるか。',
    choices: [
      '赤褐色',
      '青紫色',
      '黄色',
      '変化しない'
    ],
    correct: 1,
    explanation: 'ヨウ素デンプン反応ではデンプンがあると青紫色になります。マルトース・グルコースには反応しません。'
  },
  // Q4: 四択
  {
    type: 'mc',
    num: 4,
    text: 'マルトース（麦芽糖）にベネジクト液を加えて加熱するとどうなるか。',
    choices: [
      '青紫色に変わる',
      '変化しない',
      '赤褐色の沈殿が生じる',
      '無色透明になる'
    ],
    correct: 2,
    explanation: 'ベネジクト反応はマルトース・グルコースに加熱すると赤褐色の沈殿を生じます。デンプンには反応しません。'
  },
  // Q5: 四択
  {
    type: 'mc',
    num: 5,
    text: 'デンプン＋アミラーゼ＋水を100℃で反応させたとき、ヨウ素液を加えるとどうなるか。',
    choices: [
      '変化しない（アミラーゼが働いてデンプンが分解された）',
      '青紫色になる（アミラーゼが失活してデンプンが残った）',
      '赤褐色になる',
      'わからない'
    ],
    correct: 1,
    explanation: '100℃ではアミラーゼがタンパク質なので失活（変性凝固）し働けないため、デンプンがそのまま残り青紫色になります。'
  },
  // Q6: 四択
  {
    type: 'mc',
    num: 6,
    text: 'アミラーゼがもっともよく働く温度として正しいものはどれか。',
    choices: [
      '0〜5℃（冷蔵庫温度）',
      '37〜40℃（体温付近）',
      '60〜70℃（お湯）',
      '100℃（沸騰温度）'
    ],
    correct: 1,
    explanation: '消化酵素には最もよく働く「最適温度」があります。アミラーゼは体温に近い37〜40℃付近が最適温度です。'
  },
  // Q7: 語群タップ (消化経路)
  {
    type: 'word',
    num: 7,
    text: 'デンプンの消化経路を完成させよ。',
    sentence: 'デンプン（多糖類）は[b1]というだ液・すい液の酵素によって[b2]（二糖類）に分解され、さらに[b3]という腸液の酵素によって[b4]（単糖類）に分解されて小腸で吸収される。',
    blanks: { b1: 'アミラーゼ', b2: 'マルトース', b3: 'マルターゼ', b4: 'グルコース' },
    pool: ['アミラーゼ', 'マルトース', 'マルターゼ', 'グルコース', 'ペプシン'],
    explanation: 'デンプン→（アミラーゼ）→マルトース→（マルターゼ）→グルコース→小腸吸収。ペプシンはタンパク質の消化酵素。'
  },
  // Q8: 四択
  {
    type: 'mc',
    num: 8,
    text: 'グルコース（ブドウ糖）を検出するのに適切な方法はどれか。',
    choices: [
      'ヨウ素デンプン反応',
      'ビュレット反応',
      'フェーリング反応（加熱）',
      'キサントプロテイン反応'
    ],
    correct: 2,
    explanation: 'フェーリング反応（またはベネジクト反応・銀鏡反応）はグルコース・マルトースの検出に使います。ヨウ素はデンプン専用、ビュレット・キサントプロテインはタンパク質の検出。'
  }
];

var current = 0;
var score = 0;
let wordStates = {};
let activeBlank = null;

function render() {
  if (current >= questions.length) { showScore(); return; }
  const q = questions[current];
  document.getElementById('prog-text').textContent = `問題 ${current+1} / ${questions.length}`;
  document.getElementById('prog-fill').style.width = `${((current+1)/questions.length)*100}%`;

  let html = `<div class="q-card"><div class="q-num">問 ${q.num}</div><div class="q-text">${q.text}</div>`;

  if (q.type === 'mc') {
    html += `<div class="choices" id="choices">`;
    q.choices.forEach((c, i) => {
      html += `<button class="choice-btn" onclick="checkMC(this,${i},${q.correct},'${q.explanation.replace(/'/g,"&apos;")}')">${['①','②','③','④'][i]} ${c}</button>`;
    });
    html += `</div>`;
    html += `<div class="feedback" id="q-fb"></div>`;
  } else if (q.type === 'word') {
    wordStates = {};
    Object.keys(q.blanks).forEach(k => { wordStates[k] = null; });
    // 最初は語句が文中に見える状態
    let sent = q.sentence;
    Object.keys(q.blanks).forEach(k => {
      sent = sent.replace(`[${k}]`, `<span class="kw-drill" id="kw_${k}">${q.blanks[k]}</span>`);
    });
    html += `<div class="word-section">
      <div class="word-q" id="wq_sent">${sent}</div>
      <div class="word-pool" id="wpool" style="display:none">`;
    q.pool.forEach((w, i) => {
      // pool内のどのblankに対応するか
      const matchKey = Object.keys(q.blanks).find(k => q.blanks[k] === w) || '';
      html += `<span class="word-chip" data-word="${w}" data-key="${matchKey}" onclick="fillWord(this,'${w}')">${w}</span>`;
    });
    html += `</div>
      <div class="word-btn-row">
        <button class="word-challenge-btn" id="wchallenge-btn" onclick="startWordChallenge()">チャレンジ</button>
        <button class="word-judge-btn" id="wjudge-btn" onclick="checkWord('${q.explanation.replace(/'/g,"&apos;")}')">判定する</button>
        <button class="word-ans-btn" id="wans-btn" onclick="showWordAnswer()">お手本</button>
      </div>
      <div class="feedback" id="q-fb"></div>
    </div>`;
  }

  html += `</div>`;
  document.getElementById('quiz-area').innerHTML = html;
  activeBlank = Object.keys(questions[current].blanks || {})[0] || null;
}

function checkMC(btn, idx, correct, explanation) {
  const btns = document.getElementById('choices').querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);
  const isCorrect = idx === correct;
  if (isCorrect) {
    btn.classList.add('correct');
    score++;
    confetti();
  } else {
    btn.classList.add('wrong');
    btns[correct].classList.add('correct');
  }
  const fb = document.getElementById('q-fb');
  fb.classList.add('show', isCorrect ? 'ok' : 'ng');
  fb.innerHTML = (isCorrect ? '<b>正解！</b>　' : '<b>不正解。</b>　') + explanation;

  setTimeout(() => { current++; render(); }, 2200);
}

function setActiveBlank(bid) { activeBlank = bid; }

function fillWord(chip, word) {
  if (!activeBlank) {
    // 空きblankを探す
    const q = questions[current];
    for (const k of Object.keys(q.blanks)) {
      if (!wordStates[k]) { activeBlank = k; break; }
    }
  }
  if (!activeBlank) return;
  // 既に割り当て済みのblankから外す
  Object.keys(wordStates).forEach(k => {
    if (wordStates[k] === word) { wordStates[k] = null; document.getElementById(k).textContent = ''; }
  });
  wordStates[activeBlank] = word;
  document.getElementById(activeBlank).textContent = word;
  updateChips();
  // 次の空きblankへ
  const q = questions[current];
  const keys = Object.keys(q.blanks);
  const nextBlank = keys.find(k => !wordStates[k]);
  activeBlank = nextBlank || null;
}

function updateChips() {
  const used = Object.values(wordStates).filter(Boolean);
  document.querySelectorAll('.word-chip').forEach(c => {
    c.classList.toggle('used', used.includes(c.dataset.word));
  });
}

function checkWord(explanation) {
  const q = questions[current];
  let allOk = true;
  Object.keys(q.blanks).forEach(k => { if (wordStates[k] !== q.blanks[k]) allOk = false; });
  const fb = document.getElementById('q-fb');
  fb.classList.add('show', allOk ? 'ok' : 'ng');
  if (allOk) {
    fb.innerHTML = '<b>正解！</b>　' + explanation;
    score++;
    confetti();
    setTimeout(() => { current++; render(); }, 2200);
  } else {
    fb.innerHTML = '<b>もう一度確認してみましょう。</b>　' + explanation;
  }
}

function showScore() {
  document.getElementById('quiz-area').innerHTML = '';
  const card = document.getElementById('score-card');
  card.classList.add('show');
  const pct = Math.round(score / questions.length * 100);
  document.getElementById('sc-score').textContent = `${score} / ${questions.length}`;
  document.getElementById('sc-label').textContent = `正解率 ${pct}%`;
  let msg = pct >= 80 ? '🎉 すばらしい！よく覚えています！' : pct >= 60 ? '👍 もう少しで完璧です！' : '📖 introで確認してからもう一度！';
  document.getElementById('sc-msg').textContent = msg;
  if (pct >= 80) confettiBig();
}

function restart() {
  current = 0; score = 0;
  document.getElementById('score-card').classList.remove('show');
  render();
}

function confetti() {
  const colors = ['#ea580c','#fb923c','#fcd34d','#4ade80','#60a5fa'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colors[i%colors.length]};animation-delay:${Math.random()*0.5}s;animation-duration:${1.5+Math.random()*1}s`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
}
function confettiBig() {
  for (let i = 0; i < 80; i++) {
    setTimeout(() => confetti(), i * 30);
  }
}

render();
</script>
</body>
</html>
