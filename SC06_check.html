<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC06 油脂・無機質・ビタミン check</title>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--primary:#ea580c;--primary-light:#fed7aa;--primary-dark:#c2410c;--bg:#fff7ed;--card:#fff;--text:#1c1917;--text-sub:#78716c;--border:#e7e5e4;--correct:#16a34a;--wrong:#dc2626;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'BIZ UDPGothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  header{background:var(--primary);color:white;padding:16px 20px;display:flex;align-items:center;gap:12px;}
  header .back{color:white;text-decoration:none;font-size:20px;}
  header h1{font-size:17px;font-weight:700;line-height:1.3;}
  header .badge{margin-left:auto;background:rgba(255,255,255,0.25);border-radius:20px;padding:3px 10px;font-size:12px;}
  .container{max-width:680px;margin:0 auto;padding:20px 16px 40px;}
  .section-label{font-size:12px;font-weight:700;color:white;background:var(--primary);display:inline-block;padding:3px 12px;border-radius:20px;margin-bottom:10px;}
  .section-label.past{background:var(--primary-dark);}
  .progress-bar{background:var(--primary-light);border-radius:20px;height:8px;margin-bottom:6px;overflow:hidden;}
  .progress-fill{background:var(--primary);height:100%;border-radius:20px;transition:width 0.4s;}
  .progress-text{font-size:12px;color:var(--text-sub);margin-bottom:14px;}
  .q-card{background:var(--card);border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.08);border:2px solid var(--border);margin-bottom:12px;}
  .q-card.past-q{border-color:var(--primary-dark);}
  .q-num{font-size:12px;color:var(--primary);font-weight:700;margin-bottom:8px;}
  .q-num.past{color:var(--primary-dark);}
  .q-text{font-size:15px;line-height:1.8;margin-bottom:14px;white-space:pre-wrap;}
  .choices{display:flex;flex-direction:column;gap:8px;}
  .choice-btn{background:white;border:2px solid var(--border);border-radius:10px;padding:11px 14px;text-align:left;font-size:13px;cursor:pointer;font-family:inherit;line-height:1.5;transition:border-color 0.15s;}
  .choice-btn:hover:not(:disabled){border-color:var(--primary);background:var(--bg);}
  .choice-btn.correct{border-color:var(--correct);background:#f0fdf4;color:var(--correct);font-weight:700;}
  .choice-btn.wrong{border-color:var(--wrong);background:#fef2f2;color:var(--wrong);}
  .feedback{display:none;margin-top:10px;padding:12px 14px;border-radius:8px;font-size:13px;line-height:1.8;}
  .feedback.show{display:block;}
  .feedback.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;}
  .feedback.ng{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}
  .result-card{background:var(--card);border-radius:14px;padding:28px 20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);display:none;}
  .result-card.show{display:block;}
  .result-score{font-size:60px;font-weight:700;color:var(--primary);}
  .result-label{font-size:14px;color:var(--text-sub);margin-bottom:8px;}
  .result-bar-wrap{background:var(--primary-light);border-radius:20px;height:12px;margin:12px 0 20px;overflow:hidden;}
  .result-bar{background:var(--primary);height:100%;border-radius:20px;transition:width 1s;}
  .result-msg{font-size:17px;font-weight:700;margin-bottom:24px;}
  .result-breakdown{font-size:13px;color:var(--text-sub);margin-bottom:20px;line-height:2;}
  .nav-btn{display:block;background:var(--primary);color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;text-decoration:none;margin-top:10px;}
  .nav-btn-outline{display:block;background:white;color:var(--primary);border:2px solid var(--primary);border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;text-decoration:none;margin-top:10px;}
  .confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;animation:fall 2.5s ease-out forwards;}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>
<header>
  <a href="SC06_drill.html" class="back">←</a>
  <h1>SC06 食品の成分と性質<br>③ まとめチェック</h1>
  <span class="badge">check</span>
</header>
<div class="container">
  <div class="progress-text" id="prog-text">問題 1 / 9</div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:11.1%"></div></div>
  <div id="quiz-area"></div>
  <div class="result-card" id="result-card">
    <div class="result-score" id="r-score"></div>
    <div class="result-label">/ 9問</div>
    <div class="result-bar-wrap"><div class="result-bar" id="r-bar" style="width:0%"></div></div>
    <div class="result-msg" id="r-msg"></div>
    <div class="result-breakdown" id="r-break"></div>
    <a href="../gamba_kounin.html" class="nav-btn">メニューに戻る</a>
    <button class="nav-btn-outline" onclick="restart()">もう一度チャレンジ</button>
    <a href="SC06_intro.html" class="nav-btn-outline">解説を見直す</a>
  </div>
</div>
<script src="../gamba_support.js"></script>
<script>
var questions=[
  // 基礎5問
  {type:'mc',section:'basic',num:1,text:'油脂（脂質）の元素組成として正しいものはどれか。',choices:['炭素・水素・酸素・窒素','炭素・水素・酸素','炭素・水素のみ','炭素・酸素・窒素・リン'],correct:1,explanation:'油脂はC・H・Oのみからなります。炭水化物も同じくC・H・O。タンパク質はこれに窒素Nが加わります。'},
  {type:'mc',section:'basic',num:2,text:'油脂はすい液の酵素リパーゼで分解される。その分解産物として正しいものはどれか。',choices:['グルコースとアミノ酸','グリセリン3分子と脂肪酸1分子','モノグリセリド1分子と脂肪酸2分子','グリセリン1分子と脂肪酸3分子'],correct:2,explanation:'リパーゼ→モノグリセリド1分子＋脂肪酸2分子。元の油脂はグリセリン1分子＋脂肪酸3分子が結合したものです。'},
  {type:'mc',section:'basic',num:3,text:'鉄（Fe）が不足すると起こる欠乏症はどれか。',choices:['骨粗しょう症','味覚障害','貧血','くる病'],correct:2,explanation:'Fe不足→貧血。Ca不足→骨粗しょう症、Zn不足→味覚障害、ビタミンD不足→くる病。'},
  {type:'mc',section:'basic',num:4,text:'ビタミンCが不足すると起こる欠乏症はどれか。',choices:['夜盲症','脚気','壊血病','骨軟化症'],correct:2,explanation:'ビタミンC不足→壊血病。ビタミンA→夜盲症、B₁→脚気、D→くる病・骨軟化症。'},
  {type:'mc',section:'basic',num:5,text:'ビタミンについて正しいものはどれか。',choices:['体内で十分に合成できる','毎日大量に摂取する必要がある','現在知られているビタミンは1種類だけである','ヒトの体内ではほとんど合成することができない'],correct:3,explanation:'ビタミンは体内でほとんど合成できないため食品から摂取が必要。微量でからだの機能を調節し、不足すると欠乏症が起こります。'},
  // 過去問類題4問
  {type:'mc',section:'past',num:6,text:'油脂（脂質）に関して説明した次の文中のA〜Cに入る語句の組み合わせとして正しいものを選べ。\n\n油脂は、炭素・水素・Aの3つの元素からなる化合物で、グリセリンと脂肪酸で構成されている。油脂は消化器官で酵素のBにより、モノグリセリド1分子と脂肪酸C分子に分解され、体内に吸収される。',choices:['A=窒素　B=ペプシン　C=3','A=酸素　B=リパーゼ　C=2','A=窒素　B=リパーゼ　C=3','A=酸素　B=ペプシン　C=2'],correct:1,explanation:'油脂はC・H・O（窒素なし）。リパーゼで分解され、モノグリセリド1分子＋脂肪酸2分子に。'},
  {type:'mc',section:'past',num:7,text:'次の文は油脂について述べたものである。A・B・Cにあてはまる語句の組み合わせとして適切なものを選べ。\n\n油脂は大きく分けて常温で固体のものをAといい、液体のものをBという。油脂は脂肪酸とCから構成されている。',choices:['A=脂肪油　B=脂肪　C=グルコース','A=脂肪　B=脂肪油　C=グリセリン','A=脂肪　B=脂肪油　C=アミノ酸','A=脂肪油　B=脂肪　C=グリセリン'],correct:1,explanation:'固体→脂肪、液体→脂肪油。油脂はグリセリン＋脂肪酸から構成されます。'},
  {type:'mc',section:'past',num:8,text:'栄養素のひとつであるビタミンについて述べた文として正しいものを選べ。',choices:['ヒトの体内ではほとんど合成することができない。','毎日多量に摂取する必要がある。','現在知られているビタミンは1種類である。','細胞膜の主成分として使われている。'],correct:0,explanation:'①が正しい。ビタミンは体内でほとんど合成できず食品から摂取が必要。②微量でよい。③多くの種類がある。④細胞膜の主成分はリン脂質（脂質）。'},
  {type:'mc',section:'past',num:9,text:'オリーブ油やバターに含まれる栄養素についての記述として適切でないものを選べ。',choices:['常温で固体のものは脂肪と呼ばれ、常温で液体のものは脂肪油と呼ばれる。','体内で吸収されて、主に筋肉や骨などのからだの組織をつくる。','体内で酵素のはたらきにより、モノグリセリドと脂肪酸に分解される。','水酸化ナトリウムを加えて分解すると、セッケンが生じる。'],correct:1,explanation:'②が誤り。筋肉・骨などの組織をつくるのはタンパク質。油脂はエネルギー源として使われます。'},
];

var current=0,score=0,basicScore=0,pastScore=0;

function render(){
  if(current>=questions.length){showResult();return;}
  const q=questions[current];
  document.getElementById('prog-text').textContent=`問題 ${current+1} / ${questions.length}`;
  document.getElementById('prog-fill').style.width=`${(current+1)/questions.length*100}%`;
  const isPast=q.section==='past';
  let html=`<div class="q-card ${isPast?'past-q':''}">
    <div class="section-label ${isPast?'past':''}">${isPast?'過去問類題 '+(q.num-5)+' / 4':'基礎問題 '+q.num+' / 5'}</div>
    <div class="q-num ${isPast?'past':''}">問 ${q.num}</div>
    <div class="q-text">${q.text}</div>
    <div class="choices" id="choices">`;
  q.choices.forEach((c,i)=>{html+=`<button class="choice-btn" onclick="check(this,${i},${q.correct},'${q.explanation.replace(/'/g,"&apos;").replace(/\n/g,"\\n")}','${q.section}')">${['①','②','③','④'][i]} ${c}</button>`;});
  html+=`</div><div class="feedback" id="q-fb"></div></div>`;
  document.getElementById('quiz-area').innerHTML=html;
}

function check(btn,idx,correct,explanation,section){
  const btns=document.getElementById('choices').querySelectorAll('.choice-btn');
  btns.forEach(b=>b.disabled=true);
  const ok=idx===correct;
  if(ok){btn.classList.add('correct');score++;if(section==='basic')basicScore++;else pastScore++;confetti();}
  else{btn.classList.add('wrong');btns[correct].classList.add('correct');}
  const fb=document.getElementById('q-fb');
  fb.classList.add('show',ok?'ok':'ng');
  fb.innerHTML=(ok?'<b>正解！</b>　':'<b>不正解。</b>　')+explanation.replace(/\\n/g,'<br>');
  setTimeout(()=>{current++;render();},2400);
}

function showResult(){
  document.getElementById('quiz-area').innerHTML='';
  const card=document.getElementById('result-card');card.classList.add('show');
  const pct=Math.round(score/questions.length*100);
  document.getElementById('r-score').textContent=score;
  setTimeout(()=>{document.getElementById('r-bar').style.width=pct+'%';},100);
  document.getElementById('r-msg').textContent=pct>=89?'🎉 完璧！よく理解できています！':pct>=67?'👍 もう少しで完璧！':'📖 introでもう一度確認しましょう！';
  document.getElementById('r-break').innerHTML=`基礎問題：${basicScore} / 5　　過去問類題：${pastScore} / 4`;
  if(pct>=89){confettiBig();markPassed('SC06');}
}

function restart(){current=0;score=0;basicScore=0;pastScore=0;document.getElementById('result-card').classList.remove('show');document.getElementById('r-bar').style.width='0%';render();}
function confetti(){const colors=['#ea580c','#fb923c','#fcd34d','#4ade80','#60a5fa','#c084fc'];for(let i=0;i<35;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${colors[i%colors.length]};animation-delay:${Math.random()*0.6}s;animation-duration:${1.5+Math.random()*1.2}s`;document.body.appendChild(el);setTimeout(()=>el.remove(),3200);}}
function confettiBig(){for(let i=0;i<6;i++)setTimeout(()=>confetti(),i*200);}
render();
</script>
</body>
</html>
