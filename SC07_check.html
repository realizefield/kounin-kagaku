<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC07 プラスチック check</title>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--primary:#ea580c;--pl:#fed7aa;--pd:#c2410c;--bg:#fff7ed;--card:#fff;--text:#1c1917;--sub:#78716c;--border:#e7e5e4;--ok:#16a34a;--ng:#dc2626;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'BIZ UDPGothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  header{background:var(--primary);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px;}
  header .back{color:#fff;text-decoration:none;font-size:20px;}
  header h1{font-size:17px;font-weight:700;line-height:1.3;}
  header .badge{margin-left:auto;background:rgba(255,255,255,.25);border-radius:20px;padding:3px 10px;font-size:12px;}
  .container{max-width:680px;margin:0 auto;padding:20px 16px 40px;}
  .slabel{font-size:12px;font-weight:700;color:#fff;background:var(--primary);display:inline-block;padding:3px 12px;border-radius:20px;margin-bottom:10px;}
  .slabel.past{background:var(--pd);}
  .prog-bar{background:var(--pl);border-radius:20px;height:8px;margin-bottom:6px;overflow:hidden;}
  .prog-fill{background:var(--primary);height:100%;border-radius:20px;transition:width .4s;}
  .prog-text{font-size:12px;color:var(--sub);margin-bottom:14px;}
  .qcard{background:var(--card);border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08);border:2px solid var(--border);margin-bottom:12px;}
  .qcard.past-q{border-color:var(--pd);}
  .qnum{font-size:12px;color:var(--primary);font-weight:700;margin-bottom:8px;}
  .qnum.past{color:var(--pd);}
  .qtext{font-size:15px;line-height:1.8;margin-bottom:14px;white-space:pre-wrap;}
  .choices{display:flex;flex-direction:column;gap:8px;}
  .cbtn{background:#fff;border:2px solid var(--border);border-radius:10px;padding:11px 14px;text-align:left;font-size:13px;cursor:pointer;font-family:inherit;line-height:1.5;transition:.15s;}
  .cbtn:hover:not(:disabled){border-color:var(--primary);background:var(--bg);}
  .cbtn.correct{border-color:var(--ok);background:#f0fdf4;color:var(--ok);font-weight:700;}
  .cbtn.wrong{border-color:var(--ng);background:#fef2f2;color:var(--ng);}
  .fb{display:none;margin-top:10px;padding:12px 14px;border-radius:8px;font-size:13px;line-height:1.8;}
  .fb.show{display:block;}
  .fb.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;}
  .fb.ng{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}
  .result-card{background:var(--card);border-radius:14px;padding:28px 20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.08);display:none;}
  .result-card.show{display:block;}
  .result-score{font-size:60px;font-weight:700;color:var(--primary);}
  .result-label{font-size:14px;color:var(--sub);margin-bottom:8px;}
  .result-bar-wrap{background:var(--pl);border-radius:20px;height:12px;margin:12px 0 20px;overflow:hidden;}
  .result-bar{background:var(--primary);height:100%;border-radius:20px;transition:width 1s;}
  .result-msg{font-size:17px;font-weight:700;margin-bottom:24px;}
  .result-break{font-size:13px;color:var(--sub);margin-bottom:20px;line-height:2;}
  .nav-btn{display:block;background:var(--primary);color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;text-decoration:none;margin-top:10px;}
  .nav-btn-ol{display:block;background:#fff;color:var(--primary);border:2px solid var(--primary);border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;text-decoration:none;margin-top:10px;}
  .confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;animation:fall 2.5s ease-out forwards;}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>
<header>
  <a href="SC07_drill.html" class="back">←</a>
  <h1>SC07 プラスチック<br>まとめチェック</h1>
  <span class="badge">check</span>
</header>
<div class="container">
  <div class="prog-text" id="prog-text">問題 1 / 9</div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:11.1%"></div></div>
  <div id="quiz-area"></div>
  <div class="result-card" id="result-card">
    <div class="result-score" id="r-score"></div>
    <div class="result-label">/ 9問</div>
    <div class="result-bar-wrap"><div class="result-bar" id="r-bar" style="width:0%"></div></div>
    <div class="result-msg" id="r-msg"></div>
    <div class="result-break" id="r-break"></div>
    <a href="../gamba_kounin.html" class="nav-btn">メニューに戻る</a>
    <button class="nav-btn-ol" onclick="restart()">もう一度チャレンジ</button>
    <a href="SC07_intro.html" class="nav-btn-ol">解説を見直す</a>
  </div>
</div>
<script src="../gamba_support.js"></script>
<script>
var questions=[
  // 基礎5問
  {type:'mc',section:'basic',num:1,text:'熱硬化性樹脂の構造と性質の説明として正しいものはどれか。',choices:['綿状構造をもち、加熱するとやわらかくなる','網目状構造をもち、加熱するとかたくなる','加熱すると溶けて形が変わる','石炭を原料とする高分子化合物である'],correct:1,explanation:'熱硬化性樹脂は網目状構造をもち、加熱するとかたくなり元の形に戻らない。綿状構造で加熱→やわらかくなるのが熱可塑性樹脂。'},
  {type:'mc',section:'basic',num:2,text:'次のプラスチックのうち、熱可塑性樹脂はどれか。',choices:['尿素樹脂','フェノール樹脂','ポリエチレンテレフタラート（PET）','メラミン樹脂'],correct:2,explanation:'PETは熱可塑性樹脂（ペットボトルに使用）。尿素樹脂・フェノール樹脂・メラミン樹脂はすべて熱硬化性樹脂。'},
  {type:'mc',section:'basic',num:3,text:'単量体（モノマー）が多数結合してできた高分子化合物を何というか。',choices:['重合体（ポリマー）','縮合重合','付加重合','単結合'],correct:0,explanation:'重合体（ポリマー）は単量体（モノマー）が多数結合してできた高分子化合物。単量体→重合体になる反応が重合。'},
  {type:'mc',section:'basic',num:4,text:'プラスチックの説明として正しいものはどれか。',choices:['プラスチックは主に水素・酸素・窒素からなる','プラスチックは石油を原料につくられる高分子化合物である','プラスチックは酸やアルカリと反応してもろくなる','プラスチックはすべて電気をよく通す'],correct:1,explanation:'プラスチックは石油を原料とするC・H・O（窒素を含まない）の高分子化合物。電気を通しにくい、さびない、薬品に強いなどが特徴。'},
  {type:'mc',section:'basic',num:5,text:'ポリ塩化ビニル（PVC）に含まれる特有の元素はどれか。',choices:['窒素（N）','リン（P）','塩素（Cl）','硫黄（S）'],correct:2,explanation:'PVCには塩素（Cl）が含まれ、バイルシュタイン反応（銅線を使う炎色反応）で青緑色の炎が出ることで確認できる。'},
  // 過去問類題4問
  {type:'mc',section:'past',num:6,text:'プラスチックは多数の分子が結合している高分子化合物からできている。高分子化合物を構成する小さな単位をＡ、できあがった高分子化合物全体をＢという。ＡとＢの組み合わせとして正しいものを選べ。',choices:['A=重合体　B=単量体','A=単量体　B=重合体','A=ポリマー　B=モノマー','A=縮合重合　B=付加重合'],correct:1,explanation:'A=単量体（モノマー）、B=重合体（ポリマー）。単量体が多数結合してできた高分子化合物が重合体。'},
  {type:'mc',section:'past',num:7,text:'熱硬化性樹脂の説明とおもなプラスチックの組み合わせとして適切なものを選べ。',choices:['加熱するとやわらかくなる　ポリエチレン','加熱するとかたくなる　ポリスチレン','加熱するとかたくなる　フェノール樹脂','加熱するとやわらかくなる　尿素樹脂'],correct:2,explanation:'熱硬化性樹脂は加熱するとかたくなる。フェノール樹脂（なべの取っ手）・尿素樹脂（コンセント）・メラミン樹脂（食器）が代表例。'},
  {type:'mc',section:'past',num:8,text:'プラスチックの製法について正しいものを選べ。',choices:['プラスチックは中和によってつくられる','プラスチックは溶鉱炉で酸化物を還元してつくられる','プラスチックは重合によってつくられる','プラスチックは溶融塩電解という方法でつくられる'],correct:2,explanation:'プラスチックは重合（単量体→重合体）によってつくられる。溶鉱炉は鉄の製錬、溶融塩電解はアルミの製錬。'},
  {type:'mc',section:'past',num:9,text:'新たなプラスチックとして開発された生分解性プラスチックについて適切なものを選べ。',choices:['土の中に埋めると、微生物により水と二酸化炭素になる','原材料が主に鉱物であるため、土にかえる性質をもつ','電気を伝える性質があり、タッチパネルなどに利用される','大量の水を吸収する性質があるため紙おむつに使われる'],correct:0,explanation:'生分解性プラスチックは土中の微生物で水とCO₂に分解される環境に優しいプラスチック。②は誤り（石油原料）。③は導電性プラスチック。④は高吸水性ポリマー。'}
];

var current=0, score=0, basicScore=0, pastScore=0;

function render(){
  if(current>=questions.length){ showResult(); return; }
  var q=questions[current];
  document.getElementById('prog-text').textContent='問題 '+(current+1)+' / '+questions.length;
  document.getElementById('prog-fill').style.width=((current+1)/questions.length*100)+'%';
  var isPast=q.section==='past';
  var html='<div class="qcard '+(isPast?'past-q':'')+'"><div class="slabel '+(isPast?'past':'')+'">'+
    (isPast?'過去問類題 '+(q.num-5)+' / 4':'基礎問題 '+q.num+' / 5')+'</div>'+
    '<div class="qnum '+(isPast?'past':'')+'">問 '+q.num+'</div>'+
    '<div class="qtext">'+q.text+'</div><div class="choices" id="choices">';
  q.choices.forEach(function(c,i){ html+='<button class="cbtn" onclick="check(this,'+i+','+q.correct+',\''+q.explanation.replace(/'/g,"&apos;").replace(/\n/g,"\\n")+'\'  ,\''+q.section+'\')">'+['①','②','③','④'][i]+' '+c+'</button>'; });
  html+='</div><div class="fb" id="q-fb"></div></div>';
  document.getElementById('quiz-area').innerHTML=html;
}

function check(btn,idx,correct,explanation,section){
  var btns=document.getElementById('choices').querySelectorAll('.cbtn');
  btns.forEach(function(b){ b.disabled=true; });
  var ok=idx===correct;
  if(ok){ btn.classList.add('correct'); score++; if(section==='basic') basicScore++; else pastScore++; confetti(); }
  else{ btn.classList.add('wrong'); btns[correct].classList.add('correct'); }
  var fb=document.getElementById('q-fb'); fb.classList.add('show',ok?'ok':'ng');
  fb.innerHTML=(ok?'<b>正解！</b>　':'<b>不正解。</b>　')+explanation.replace(/\\n/g,'<br>');
  setTimeout(function(){ current++; render(); },2400);
}

function showResult(){
  document.getElementById('quiz-area').innerHTML='';
  var card=document.getElementById('result-card'); card.classList.add('show');
  var pct=Math.round(score/questions.length*100);
  document.getElementById('r-score').textContent=score;
  setTimeout(function(){ document.getElementById('r-bar').style.width=pct+'%'; },100);
  document.getElementById('r-msg').textContent=pct>=89?'🎉 完璧！よく理解できています！':pct>=67?'👍 もう少しで完璧！':'📖 introでもう一度確認しましょう！';
  document.getElementById('r-break').innerHTML='基礎問題：'+basicScore+' / 5　　過去問類題：'+pastScore+' / 4';
  if(pct>=89){ confettiBig(); markPassed('SC07'); }
}

function restart(){ current=0; score=0; basicScore=0; pastScore=0; document.getElementById('result-card').classList.remove('show'); document.getElementById('r-bar').style.width='0%'; render(); }
function confetti(){ var cols=['#ea580c','#fb923c','#fcd34d','#4ade80','#60a5fa','#c084fc']; for(var i=0;i<35;i++){ var el=document.createElement('div'); el.className='confetti-piece'; el.style.cssText='left:'+Math.random()*100+'vw;top:-10px;background:'+cols[i%cols.length]+';animation-delay:'+Math.random()*.6+'s;animation-duration:'+(1.5+Math.random()*1.2)+'s'; document.body.appendChild(el); setTimeout(function(e){ return function(){ e.remove(); }; }(el),3200); } }
function confettiBig(){ for(var i=0;i<6;i++) setTimeout(function(){ confetti(); },i*200); }
render();
</script>
</body>
</html>
