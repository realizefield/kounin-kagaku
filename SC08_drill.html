<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC08 リサイクル drill</title>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--primary:#ea580c;--pl:#fed7aa;--pd:#c2410c;--bg:#fff7ed;--card:#fff;--text:#1c1917;--sub:#78716c;--border:#e7e5e4;--ok:#16a34a;--ng:#dc2626;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'BIZ UDPGothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  header{background:var(--primary);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px;}
  header .back{color:#fff;text-decoration:none;font-size:20px;}
  header h1{font-size:17px;font-weight:700;line-height:1.3;}
  header .badge{margin-left:auto;background:rgba(255,255,255,.25);border-radius:20px;padding:3px 10px;font-size:12px;}
  .container{max-width:680px;margin:0 auto;padding:20px 16px 40px;}
  .prog-text{font-size:12px;color:var(--sub);margin-bottom:6px;}
  .prog-bar{background:var(--pl);border-radius:20px;height:8px;margin-bottom:14px;overflow:hidden;}
  .prog-fill{background:var(--primary);height:100%;border-radius:20px;transition:width .4s;}
  .qcard{background:var(--card);border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08);border:2px solid var(--border);margin-bottom:12px;}
  .qnum{font-size:12px;color:var(--primary);font-weight:700;margin-bottom:8px;}
  .qtext{font-size:15px;line-height:1.8;margin-bottom:14px;white-space:pre-wrap;}
  .choices{display:flex;flex-direction:column;gap:8px;}
  .cbtn{background:#fff;border:2px solid var(--border);border-radius:10px;padding:11px 14px;text-align:left;font-size:13px;cursor:pointer;font-family:inherit;line-height:1.5;transition:.15s;}
  .cbtn:hover:not(:disabled){border-color:var(--primary);background:var(--bg);}
  .cbtn.correct{border-color:var(--ok);background:#f0fdf4;color:var(--ok);font-weight:700;}
  .cbtn.wrong{border-color:var(--ng);background:#fef2f2;color:var(--ng);}
  .fb{display:none;margin-top:10px;padding:12px 14px;border-radius:8px;font-size:13px;line-height:1.8;}
  .fb.show{display:block;}
  .fb.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;}
  .fb.ng{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}
  .kw-d{display:inline-block;background:#fff7ed;border:2px solid var(--primary);border-radius:6px;padding:1px 8px;color:var(--pd);font-weight:700;font-size:14px;}
  .blank{display:inline-block;min-width:72px;border-bottom:2px solid var(--primary);padding:0 6px;color:var(--primary);font-weight:700;text-align:center;font-size:14px;cursor:pointer;}
  .wpool{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .wchip{background:#fff;border:2px solid var(--primary);border-radius:20px;padding:5px 14px;font-size:13px;cursor:pointer;transition:.15s;font-family:inherit;}
  .wchip:hover{background:var(--primary);color:#fff;}
  .wchip.used{opacity:.35;pointer-events:none;}
  .wbtn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .wchallenge-btn{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
  .wjudge-btn{background:#059669;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:none;}
  .wans-btn{background:#fff;color:var(--primary);border:2px solid var(--primary);border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:none;}
  .score-card{background:var(--card);border-radius:14px;padding:28px 20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.08);display:none;}
  .score-card.show{display:block;}
  .score-big{font-size:56px;font-weight:700;color:var(--primary);}
  .score-label{font-size:14px;color:var(--sub);margin-bottom:16px;}
  .score-msg{font-size:16px;font-weight:700;margin-bottom:24px;}
  .nav-btn{display:block;width:100%;background:var(--primary);color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;text-decoration:none;margin-top:12px;}
  .nav-btn-ol{display:block;width:100%;background:#fff;color:var(--primary);border:2px solid var(--primary);border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;text-decoration:none;margin-top:10px;}
  .confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;animation:fall 2.5s ease-out forwards;}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>
<header>
  <a href="SC08_intro.html" class="back">←</a>
  <h1>SC08 リサイクル（3R）</h1>
  <span class="badge">drill</span>
</header>
<div class="container">
  <div class="prog-text" id="prog-text">問題 1 / 8</div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:12.5%"></div></div>
  <div id="quiz-area"></div>
  <div class="score-card" id="score-card">
    <div class="score-big" id="sc-score"></div>
    <div class="score-label" id="sc-label"></div>
    <div class="score-msg" id="sc-msg"></div>
    <a href="SC08_check.html" class="nav-btn">まとめチェックに進む →</a>
    <button class="nav-btn-ol" onclick="restart()">もう一度チャレンジ</button>
    <a href="SC08_intro.html" class="nav-btn-ol">解説を見直す</a>
  </div>
</div>
<script>
var questions=[
  {type:'mc',num:1,text:'3Rのうち「廃棄物を減らす」にあたるものはどれか。',choices:['Recycle（リサイクル）','Reuse（リユース）','Reduce（リデュース）','Remake（リメイク）'],correct:2,explanation:'Reduce（リデュース）＝廃棄物を減らす。Reuse＝そのまま再使用。Recycle＝再生して利用。Remakeは3Rに含まれない。'},
  {type:'mc',num:2,text:'ビール瓶を洗浄・殺菌してそのまま再使用することは3Rのどれか。',choices:['Reduce','Reuse','Recycle','3Rのどれでもない'],correct:1,explanation:'Reuse（リユース）＝形を変えずそのまま再使用。ビール瓶の回収率はほぼ100%で、リユースの代表例。'},
  {type:'mc',num:3,text:'廃プラスチックを化学的に分解しガスや油に変えて利用するリサイクルは何か。',choices:['マテリアルリサイクル','ケミカルリサイクル','サーマルリサイクル','バイオリサイクル'],correct:1,explanation:'ケミカルリサイクル＝高温で化学的に分解しガスや油などに変える。廃プラ→メタノール・水素などに熱分解して利用。'},
  {type:'mc',num:4,text:'マテリアルリサイクル・ケミカルリサイクルがどちらも不可能な場合に行うリサイクルはどれか。',choices:['マテリアルリサイクル','サーマルリサイクル','バイオリサイクル','リユース'],correct:1,explanation:'サーマルリサイクルは最後の手段。焼却して発生した熱エネルギーを温泉施設等に提供するなど熱エネルギーとして利用する。'},
  {type:'mc',num:5,text:'紙・ガラス・鉄・アルミニウムのうち、再生原料から作った場合の省エネルギー効果が最も大きいものはどれか。',choices:['紙','ガラス','鉄','アルミニウム'],correct:3,explanation:'アルミニウムの製錬（融解塩電解）は膨大な電力が必要。リサイクルすれば新たに製錬するエネルギーの約97%を節約できるため省エネ効果が最大。'},
  {type:'mc',num:6,text:'3Rについての説明として正しいものはどれか。',choices:['Reuse はペットボトルをクリアファイルに加工することである','アルミニウムのリサイクルは省エネ効果が最も小さい','ビール瓶はリユースの代表例で回収率はほぼ100%である','サーマルリサイクルはマテリアルリサイクルより優先される'],correct:2,explanation:'ビール瓶はリユースの代表例で回収率ほぼ100%。ペットボトル→クリアファイルはマテリアルリサイクル。アルミの省エネ効果は最大（97%節約）。優先順位はマテリアル→ケミカル→サーマル。'},
  {type:'word',num:7,text:'リサイクルの種類を完成させよ。',
   sentence:'廃プラスチックを加工して製品の材料にするのが[b1]リサイクル、化学的に分解してガスや油にするのが[b2]リサイクル、焼却して熱エネルギーを利用するのが[b3]リサイクルである。',
   blanks:{b1:'マテリアル',b2:'ケミカル',b3:'サーマル'},
   pool:['マテリアル','ケミカル','サーマル','バイオ','リデュース'],
   explanation:'マテリアル（物→物）→ケミカル（化学分解）→サーマル（焼却熱利用）の順が優先順位。'},
  {type:'mc',num:8,text:'次のうちリユース（Reuse）に関連する記述として適切なものはどれか。',choices:['ペットボトルをペレットに加工しクリアファイルにする','ビール瓶を洗浄・殺菌してそのまま再使用する','廃プラスチックをメタノールに熱分解して利用する','ごみ焼却場の熱を温水プール施設に提供する'],correct:1,explanation:'②ビール瓶の洗浄・殺菌→そのまま再使用がリユース。①マテリアルリサイクル、③ケミカルリサイクル、④サーマルリサイクル。'}
];

var current=0,score=0;
var wState={},wRunning=false,wSelChip=null,wSelBlank=null,wAns={};

function render(){
  if(current>=questions.length){showScore();return;}
  var q=questions[current];
  document.getElementById('prog-text').textContent='問題 '+(current+1)+' / '+questions.length;
  document.getElementById('prog-fill').style.width=((current+1)/questions.length*100)+'%';
  var html='<div class="qcard"><div class="qnum">問 '+q.num+'</div><div class="qtext">'+q.text+'</div>';
  if(q.type==='mc'){
    html+='<div class="choices" id="choices">';
    q.choices.forEach(function(c,i){ html+='<button class="cbtn" onclick="checkMC(this,'+i+','+q.correct+',\''+q.explanation.replace(/'/g,"&apos;")+'\')">'+['①','②','③','④'][i]+' '+c+'</button>'; });
    html+='</div><div class="fb" id="q-fb"></div>';
  } else {
    wState={};wAns=q.blanks;Object.keys(q.blanks).forEach(function(k){wState[k]=null;});
    wRunning=false;wSelChip=null;wSelBlank=null;
    var sent=q.sentence;
    Object.keys(q.blanks).forEach(function(k){sent=sent.replace('['+k+']','<span class="kw-d" id="kw_'+k+'">'+q.blanks[k]+'</span>');});
    html+='<div><div class="qtext">'+sent+'</div><div class="wpool" id="wpool" style="display:none">';
    q.pool.forEach(function(w){html+='<span class="wchip" data-word="'+w+'" onclick="wDTap(this)">'+w+'</span>';});
    html+='</div><div class="wbtn-row"><button class="wchallenge-btn" id="wchbtn" onclick="startDChallenge()">チャレンジ</button><button class="wjudge-btn" id="wjbtn" onclick="judgeDWord(\''+q.explanation.replace(/'/g,"&apos;")+'\')">判定する</button><button class="wans-btn" id="wabtn" onclick="showDAns()">お手本</button></div><div class="fb" id="q-fb"></div></div>';
  }
  html+='</div>';
  document.getElementById('quiz-area').innerHTML=html;
}

function checkMC(btn,idx,correct,explanation){
  var btns=document.getElementById('choices').querySelectorAll('.cbtn');
  btns.forEach(function(b){b.disabled=true;});
  var ok=idx===correct;
  if(ok){btn.classList.add('correct');score++;confetti();}
  else{btn.classList.add('wrong');btns[correct].classList.add('correct');}
  var fb=document.getElementById('q-fb');fb.classList.add('show',ok?'ok':'ng');
  fb.innerHTML=(ok?'<b>正解！</b>　':'<b>不正解。</b>　')+explanation;
  setTimeout(function(){current++;render();},2200);
}

function startDChallenge(){
  wRunning=true;wSelChip=null;wSelBlank=null;
  Object.keys(wAns).forEach(function(k){
    wState[k]=null;
    var el=document.getElementById('kw_'+k);
    el.className='blank';el.id=k;el.textContent='';
    if(el._dh) el.removeEventListener('click',el._dh);
    el._dh=(function(id){return function(){dBlankTap(id);};})(k);
    el.addEventListener('click',el._dh);
  });
  document.querySelectorAll('#wpool .wchip').forEach(function(c){c.classList.remove('used');c.style.outline='';c.style.background='';c.style.color='';});
  document.getElementById('wpool').style.display='flex';
  document.getElementById('wchbtn').style.display='none';
  document.getElementById('wjbtn').style.display='inline-block';
  document.getElementById('wabtn').style.display='inline-block';
}
function wDTap(chip){
  if(!wRunning)return;
  if(wSelChip===chip){dClearChip();return;}
  if(wSelBlank){dPlace(chip,wSelBlank);dClearBlank();return;}
  dClearChip();wSelChip=chip;chip.style.outline='3px solid #ea580c';chip.style.background='#ea580c';chip.style.color='#fff';
}
function dBlankTap(bid){
  if(!wRunning)return;
  if(wSelChip){dPlace(wSelChip,bid);dClearChip();return;}
  if(wState[bid])dReturn(bid);
  dClearBlank();wSelBlank=bid;document.getElementById(bid).style.background='#fff7ed';
}
function dPlace(chip,bid){
  for(var k in wState){if(wState[k]===chip){wState[k]=null;document.getElementById(k).textContent='';document.getElementById(k).style.background='';}}
  if(wState[bid])dReturn(bid);
  wState[bid]=chip;document.getElementById(bid).textContent=chip.dataset.word;document.getElementById(bid).style.background='';
  chip.classList.add('used');
}
function dReturn(bid){
  var chip=wState[bid];
  if(chip){chip.classList.remove('used');chip.style.outline='';chip.style.background='';chip.style.color='';}
  wState[bid]=null;document.getElementById(bid).textContent='';document.getElementById(bid).style.background='';
}
function dClearChip(){if(wSelChip){wSelChip.style.outline='';wSelChip.style.background='';wSelChip.style.color='';wSelChip=null;}}
function dClearBlank(){if(wSelBlank){document.getElementById(wSelBlank).style.background='';wSelBlank=null;}}
function judgeDWord(explanation){
  dClearChip();dClearBlank();
  var allOk=true;
  Object.keys(wAns).forEach(function(k){if(!wState[k]||wState[k].dataset.word!==wAns[k])allOk=false;});
  var fb=document.getElementById('q-fb');fb.classList.add('show');
  if(allOk){fb.classList.add('ok');fb.innerHTML='<b>正解！</b>　'+explanation;score++;confetti();setTimeout(function(){current++;render();},2200);}
  else{fb.classList.add('ng');fb.innerHTML='<b>もう一度！</b>　間違った語句を語群に戻しました。';Object.keys(wAns).forEach(function(k){if(!wState[k]||wState[k].dataset.word!==wAns[k])dReturn(k);});}
}
function showDAns(){
  Object.keys(wAns).forEach(function(k){
    if(wState[k])wState[k].classList.remove('used');
    var el=document.getElementById(k);el.textContent=wAns[k];el.className='kw-d';
    if(el._dh){el.removeEventListener('click',el._dh);el._dh=null;}
    el.style.background='';
  });
  document.getElementById('wpool').style.display='none';
  document.getElementById('wjbtn').style.display='none';document.getElementById('wabtn').style.display='none';
  var btn=document.getElementById('wchbtn');btn.textContent='もう一度チャレンジ';btn.style.display='inline-block';
  wRunning=false;dClearChip();dClearBlank();
}
function showScore(){
  document.getElementById('quiz-area').innerHTML='';
  var card=document.getElementById('score-card');card.classList.add('show');
  var pct=Math.round(score/questions.length*100);
  document.getElementById('sc-score').textContent=score+' / '+questions.length;
  document.getElementById('sc-label').textContent='正解率 '+pct+'%';
  document.getElementById('sc-msg').textContent=pct>=80?'🎉 すばらしい！':pct>=60?'👍 もう少し！':'📖 introで確認してからもう一度！';
  if(pct>=80)confettiBig();
}
function restart(){current=0;score=0;document.getElementById('score-card').classList.remove('show');render();}
function confetti(){var cols=['#ea580c','#fb923c','#fcd34d','#4ade80','#60a5fa'];for(var i=0;i<30;i++){var el=document.createElement('div');el.className='confetti-piece';el.style.cssText='left:'+Math.random()*100+'vw;top:-10px;background:'+cols[i%cols.length]+';animation-delay:'+Math.random()*.5+'s;animation-duration:'+(1.5+Math.random())+'s';document.body.appendChild(el);setTimeout((function(e){return function(){e.remove();};})(el),3000);}}
function confettiBig(){for(var i=0;i<5;i++)setTimeout(function(){confetti();},i*200);}
render();
</script>
</body>
</html>
